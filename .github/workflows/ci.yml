name: CI

on:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: 'true'

jobs:
  test:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.11", "3.12"]
    steps:
      - uses: actions/checkout@v4

      - name: Install uv
        uses: astral-sh/setup-uv@v3
        with:
          enable-cache: true

      - name: Set up Python ${{ matrix.python-version }}
        run: uv python install ${{ matrix.python-version }}

      - name: Install project and dev dependencies
        run: uv sync --extra dev --python ${{ matrix.python-version }}

      - name: Lint with ruff
        run: uv run --python ${{ matrix.python-version }} ruff check gamdist tests

      - name: Format check with ruff
        run: uv run --python ${{ matrix.python-version }} ruff format --check gamdist tests

      - name: Type-check with mypy
        run: uv run --python ${{ matrix.python-version }} mypy gamdist

      - name: Run tests with coverage
        run: |
          uv run --python ${{ matrix.python-version }} \
            pytest --cov=gamdist --cov-report=term --cov-fail-under=80
        env:
          MPLBACKEND: Agg
